name: 💡 Feature Request
description: Suggest a feature or improvement
title: "[feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Feature requests help us prioritize development. Please be specific.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Consensus / Protocol
        - Post-Quantum Cryptography
        - Privacy (LatticeFold/BP++)
        - Wallet
        - P2P / Networking
        - RPC / API
        - Build / CI / DevOps
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently, users cannot..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any references, screenshots, or links
