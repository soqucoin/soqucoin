name: macOS Native Build

on:
  push:
    branches: [soqucoin-genesis, master]
  pull_request:
    branches: [soqucoin-genesis, master]

jobs:
  # Note: macos-15 is ARM64 only. Intel builds are done via cross-compilation.
  build-macos-arm64:
    runs-on: macos-15
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          # berkeley-db@4 is deprecated, build without wallet for now
          brew install automake libtool boost libevent zeromq ccache pkgconf openssl@3
      
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-arm64-ccache-${{ github.sha }}
          restore-keys: |
            macos-arm64-ccache-
      
      - name: Build Soqucoin
        run: |
          export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
          ./autogen.sh
          BOOST_ROOT=$(brew --prefix boost)
          OPENSSL_ROOT=$(brew --prefix openssl@3)
          LIBEVENT_ROOT=$(brew --prefix libevent)
          ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench \
            --disable-wallet \
            --without-miniupnpc \
            --with-boost="$BOOST_ROOT" \
            --with-boost-libdir="$BOOST_ROOT/lib" \
            CPPFLAGS="-I$BOOST_ROOT/include -I$OPENSSL_ROOT/include -I$LIBEVENT_ROOT/include" \
            LDFLAGS="-L$BOOST_ROOT/lib -L$OPENSSL_ROOT/lib -L$LIBEVENT_ROOT/lib"
          make -j$(sysctl -n hw.ncpu) V=1
      
      - name: Smoke Test - Version
        run: |
          echo "Testing soqucoind..."
          ./src/soqucoind --version && echo "soqucoind OK" || echo "soqucoind version check failed"
          echo "Testing soqucoin-tx..."
          ./src/soqucoin-tx --version && echo "soqucoin-tx OK" || echo "soqucoin-tx version check failed"
          echo "Testing soqucoin-cli exists..."
          test -f ./src/soqucoin-cli && echo "soqucoin-cli OK" || exit 1
          echo "SUCCESS: All binaries exist and core binaries report version"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-arm64
          path: |
            src/soqucoind
            src/soqucoin-cli
            src/soqucoin-tx
