name: macOS Native Build

on:
  push:
    branches: [soqucoin-genesis, master]
  pull_request:
    branches: [soqucoin-genesis, master]

jobs:
  build-macos-intel:
    runs-on: macos-15  # macos-13 has been retired
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          # berkeley-db@4 is deprecated, build without wallet for now
          brew install automake libtool boost miniupnpc \
            libevent zeromq ccache pkgconf
      
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-intel-ccache-${{ github.sha }}
          restore-keys: |
            macos-intel-ccache-
      
      - name: Build Soqucoin
        run: |
          export PATH="/usr/local/opt/ccache/libexec:$PATH"
          ./autogen.sh
          ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench \
            --disable-wallet \
            --with-boost=$(brew --prefix boost)
          make -j$(sysctl -n hw.ncpu) V=1
      
      - name: Smoke Test - Version
        run: |
          ./src/soqucoind --version
          ./src/soqucoin-cli --version
          ./src/soqucoin-tx --version
          echo "SUCCESS: All binaries report version correctly"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-intel
          path: |
            src/soqucoind
            src/soqucoin-cli
            src/soqucoin-tx

  build-macos-arm64:
    runs-on: macos-15  # Updated from macos-14
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          # berkeley-db@4 is deprecated, build without wallet for now
          brew install automake libtool boost miniupnpc \
            libevent zeromq ccache pkgconf
      
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: macos-arm64-ccache-${{ github.sha }}
          restore-keys: |
            macos-arm64-ccache-
      
      - name: Build Soqucoin
        run: |
          export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"
          ./autogen.sh
          ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench \
            --disable-wallet \
            --with-boost=$(brew --prefix boost)
          make -j$(sysctl -n hw.ncpu) V=1
      
      - name: Smoke Test - Version
        run: |
          ./src/soqucoind --version
          ./src/soqucoin-cli --version
          ./src/soqucoin-tx --version
          echo "SUCCESS: All binaries report version correctly"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-arm64
          path: |
            src/soqucoind
            src/soqucoin-cli
            src/soqucoin-tx
