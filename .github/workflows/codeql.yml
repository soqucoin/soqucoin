name: "CodeQL"

on:
  push:
    branches: [ "soqucoin-genesis", "main" ]
  pull_request:
    branches: [ "soqucoin-genesis" ]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake \
          pkg-config libssl-dev libevent-dev bsdmainutils python3 libboost-all-dev libdb++-dev

    - name: Autogen
      run: ./autogen.sh

    - name: Configure
      run: ./configure --disable-tests --disable-bench --without-gui

    - name: Build
      run: make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
