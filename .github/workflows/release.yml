# Soqucoin Release Build Workflow
# Automatically builds and releases binaries for all platforms on tagged releases

name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.21.0)'
        required: true
        default: 'v1.0.0-rc1'

env:
  MAKEFLAGS: -j4

jobs:
  # ============================================
  # Linux x86_64 Build
  # ============================================
  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev \
            libevent-dev libboost-all-dev libminiupnpc-dev \
            libzmq3-dev libsqlite3-dev libdb++-dev
      
      - name: Build
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-linux-x64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-linux-x64
          path: soqucoin-*-linux-x64.tar.gz

  # ============================================
  # Linux ARM64 Build (cross-compile from x64)
  # ============================================
  build-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up ARM64 multiarch
        run: |
          # Step 1: Add ARM64 architecture FIRST
          sudo dpkg --add-architecture arm64
          
          # Step 2: Pin existing sources to amd64 only
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          
          # Step 3: Add ARM64 package sources (Ubuntu ports)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list

          # Step 4: Update package lists with new architecture
          sudo apt-get update

      - name: Install build tools and cross-compiler
        run: |
          # Native build tools (run on x64)
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 \
            g++-aarch64-linux-gnu gcc-aarch64-linux-gnu

      - name: Install ARM64 cross-libraries
        run: |
          # ARM64 target libraries (linked into the ARM64 binary)
          sudo apt-get install -y \
            libssl-dev:arm64 \
            libevent-dev:arm64 \
            libboost-system-dev:arm64 \
            libboost-filesystem-dev:arm64 \
            libboost-thread-dev:arm64 \
            libboost-chrono-dev:arm64 \
            libboost-program-options-dev:arm64 \
            libdb++-dev:arm64
      
      - name: Build (cross-compile)
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --disable-zmq --without-miniupnpc \
            --host=aarch64-linux-gnu \
            --with-boost-libdir=/usr/lib/aarch64-linux-gnu \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib \
            STRIP=aarch64-linux-gnu-strip \
            PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
            PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig \
            CPPFLAGS="-I/usr/aarch64-linux-gnu/include" \
            LDFLAGS="-L/usr/aarch64-linux-gnu/lib"
          make $MAKEFLAGS
      
      - name: Verify binary architecture
        run: |
          file src/soqucoind | grep -q "aarch64" && echo "✅ soqucoind is ARM64" || (echo "❌ Wrong architecture" && exit 1)
          file src/soqucoin-cli | grep -q "aarch64" && echo "✅ soqucoin-cli is ARM64" || (echo "❌ Wrong architecture" && exit 1)

      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-linux-arm64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-linux-arm64
          path: soqucoin-*-linux-arm64.tar.gz

  # ============================================
  # macOS Intel Build
  # ============================================
  build-macos-x64:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install automake libtool boost miniupnpc openssl@3 pkg-config libevent zeromq
      
      - name: Build
        env:
          BOOST_ROOT: /opt/homebrew
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --with-boost=/opt/homebrew \
            LDFLAGS="-L/opt/homebrew/lib -L$(brew --prefix openssl@3)/lib -L$(brew --prefix libevent)/lib" \
            CPPFLAGS="-I/opt/homebrew/include -I$(brew --prefix openssl@3)/include -I$(brew --prefix libevent)/include"
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-macos-x64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-x64
          path: soqucoin-*-macos-x64.tar.gz

  # ============================================
  # macOS ARM64 (Apple Silicon) Build
  # ============================================
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install automake libtool boost miniupnpc openssl@3 pkg-config libevent zeromq
      
      - name: Build
        env:
          BOOST_ROOT: /opt/homebrew
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --with-boost=/opt/homebrew \
            LDFLAGS="-L/opt/homebrew/lib -L/opt/homebrew/opt/openssl@3/lib -L/opt/homebrew/opt/libevent/lib" \
            CPPFLAGS="-I/opt/homebrew/include -I/opt/homebrew/opt/openssl@3/include -I/opt/homebrew/opt/libevent/include"
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-macos-arm64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-arm64
          path: soqucoin-*-macos-arm64.tar.gz

  # ============================================
  # Windows x64 Cross-Compile Build
  # ============================================
  build-windows-x64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev \
            curl
      
      - name: Set mingw-w64 to POSIX threading
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
      
      - name: Build depends
        run: |
          make -C depends HOST=x86_64-w64-mingw32 -j4 NO_QT=1
      
      - name: Build
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
            ./configure --prefix=/ --without-gui --disable-tests --disable-bench
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind.exe src/soqucoin-cli.exe dist/ 2>/dev/null || \
          cp src/soqucoind src/soqucoin-cli dist/
          cd dist && zip -r ../soqucoin-${{ github.ref_name }}-windows-x64.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-windows-x64
          path: soqucoin-*-windows-x64.zip

  # ============================================
  # Create Release with All Artifacts
  # ============================================
  create-release:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Flatten artifacts
        run: |
          mkdir release
          find . -name "*.tar.gz" -exec mv {} release/ \;
          find . -name "*.zip" -exec mv {} release/ \;
      
      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz *.zip > SHA256SUMS
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
