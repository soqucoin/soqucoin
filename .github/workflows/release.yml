# Soqucoin Release Build Workflow
# Automatically builds and releases binaries for all platforms on tagged releases

name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.21.0)'
        required: true
        default: 'v0.21.0'

env:
  MAKEFLAGS: -j4

jobs:
  # ============================================
  # Linux x86_64 Build
  # ============================================
  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev \
            libevent-dev libboost-all-dev libminiupnpc-dev \
            libzmq3-dev libsqlite3-dev libdb++-dev
      
      - name: Build
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-linux-x64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-linux-x64
          path: soqucoin-*-linux-x64.tar.gz

  # ============================================
  # Linux ARM64 Build (Cross-Compiled for Raspberry Pi)
  # ============================================
  build-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install cross-compiler and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            libtool autotools-dev automake pkg-config bsdmainutils python3
          
      - name: Install ARM64 libraries
        run: |
          # Add ARM64 architecture
          sudo dpkg --add-architecture arm64
          
          # Add ARM64 package sources
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev:arm64 \
            libevent-dev:arm64 \
            libboost-all-dev:arm64 \
            libdb++-dev:arm64
      
      - name: Build with cross-compiler
        run: |
          ./autogen.sh
          ./configure --host=aarch64-linux-gnu \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            --without-gui --disable-tests --disable-bench --disable-wallet
          make -j$(nproc)
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-linux-arm64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-linux-arm64
          path: soqucoin-*-linux-arm64.tar.gz

  # ============================================
  # macOS Intel Build
  # ============================================
  build-macos-x64:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install automake libtool boost miniupnpc openssl@3 pkg-config libevent zeromq
      
      - name: Build
        env:
          BOOST_ROOT: /opt/homebrew
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --with-boost=/opt/homebrew \
            LDFLAGS="-L/opt/homebrew/lib -L$(brew --prefix openssl@3)/lib -L$(brew --prefix libevent)/lib" \
            CPPFLAGS="-I/opt/homebrew/include -I$(brew --prefix openssl@3)/include -I$(brew --prefix libevent)/include"
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-macos-x64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-x64
          path: soqucoin-*-macos-x64.tar.gz

  # ============================================
  # macOS ARM64 (Apple Silicon) Build
  # ============================================
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install automake libtool boost miniupnpc openssl@3 pkg-config libevent zeromq
      
      - name: Build
        env:
          BOOST_ROOT: /opt/homebrew
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --with-boost=/opt/homebrew \
            LDFLAGS="-L/opt/homebrew/lib -L/opt/homebrew/opt/openssl@3/lib -L/opt/homebrew/opt/libevent/lib" \
            CPPFLAGS="-I/opt/homebrew/include -I/opt/homebrew/opt/openssl@3/include -I/opt/homebrew/opt/libevent/include"
          make $MAKEFLAGS
      
      - name: Package
        run: |
          mkdir -p dist
          cp src/soqucoind src/soqucoin-cli dist/
          tar -czvf soqucoin-${{ github.ref_name }}-macos-arm64.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-macos-arm64
          path: soqucoin-*-macos-arm64.tar.gz

  # ============================================
  # Create Release with All Artifacts
  # ============================================
  create-release:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Flatten artifacts
        run: |
          mkdir release
          find . -name "*.tar.gz" -exec mv {} release/ \;
      
      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz > SHA256SUMS
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.tar.gz
            release/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
