name: CI

on:
  push:
    branches: [main, 'release/**']
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAKEFLAGS: -j4

jobs:
  # ============================================
  # Lint
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # need HEAD~1 for the changed-lines diff (default checkout is shallow)
      - name: Trailing whitespace (changed lines)
        run: |
          # HEAD~1 is absent on the very first commit / some events — don't hard-fail (exit 128).
          if git rev-parse --verify --quiet HEAD~1 >/dev/null; then
            git diff --check HEAD~1 HEAD -- ':!src/leveldb' ':!src/univalue' ':!src/secp256k1'
          else
            echo "no previous commit to diff against — skipping whitespace check"
          fi
      - name: Python functional tests must compile
        run: |
          python3 -m py_compile qa/rpc-tests/*.py qa/pull-tester/*.py
      - name: Shell scripts pass shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Soqucoin-authored scripts only; vendored/autotools excluded.
          shellcheck -S error contrib/devtools/check-crypto-licenses.sh

  # ============================================
  # Linux x86_64 (primary build + tests)
  # ============================================
  build-linux-x64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 libssl-dev \
            libevent-dev libboost-all-dev libminiupnpc-dev \
            libzmq3-dev libsqlite3-dev libdb++-dev ccache \
            python3-zmq curl python3-pip python3-setuptools python3-dev
          # ltc_scrypt (Litecoin scrypt hasher) — required by qa/rpc-tests auxpow.py.
          # Use the repo's sanctioned installer: pulls ltc-scrypt v1.0.1 from the
          # Dogecoin upstream (sha256-checked) and pip-installs it. See qa/README.md.
          ./qa/pull-tester/install-deps.sh

      - name: CCache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: linux-x64-ccache-${{ hashFiles('**/configure.ac') }}
          restore-keys: linux-x64-ccache-

      - name: Build (with unit + bench tests enabled)
        run: |
          ./autogen.sh
          ./configure --without-gui \
            --enable-zmq --enable-module-rangeproof \
            --enable-module-generator --enable-experimental
          make $MAKEFLAGS

      - name: Run unit tests (make check)
        run: |
          make check VERBOSE=1

      - name: Run functional tests (Soqucoin-specific)
        run: |
          python3 qa/pull-tester/rpc-tests.py \
            auxpow.py latticefold_basic.py pat_basic.py

  # ============================================
  # Linux ARM64 (cross-compile)
  # ============================================
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up ARM64 multiarch
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update

      - name: Install build tools
        run: |
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 \
            g++-aarch64-linux-gnu gcc-aarch64-linux-gnu

      - name: Install ARM64 libraries
        run: |
          sudo apt-get install -y \
            libssl-dev:arm64 \
            libevent-dev:arm64 \
            libboost-system-dev:arm64 \
            libboost-filesystem-dev:arm64 \
            libboost-thread-dev:arm64 \
            libboost-chrono-dev:arm64 \
            libboost-program-options-dev:arm64 \
            libdb++-dev:arm64

      - name: Build (cross-compile)
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --disable-zmq --without-miniupnpc \
            --host=aarch64-linux-gnu \
            --with-boost-libdir=/usr/lib/aarch64-linux-gnu \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib \
            STRIP=aarch64-linux-gnu-strip \
            PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
            PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig \
            CPPFLAGS="-I/usr/aarch64-linux-gnu/include" \
            LDFLAGS="-L/usr/aarch64-linux-gnu/lib"
          make $MAKEFLAGS

      - name: Verify binary architecture
        run: |
          file src/.libs/soqucoind 2>/dev/null | grep -q "aarch64" && echo "✅ soqucoind is ARM64" || \
          file src/soqucoind | grep -q "aarch64" && echo "✅ soqucoind is ARM64" || (echo "❌ Wrong architecture" && exit 1)

  # ============================================
  # Windows x64 (cross-compile from Linux)
  # ============================================
  build-windows-x64:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils python3 \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev curl

      - name: Set mingw-w64 to POSIX threading
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Build depends
        run: |
          make -j4 -C depends HOST=x86_64-w64-mingw32 NO_QT=1

      - name: Build
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
            ./configure --prefix=/ --without-gui --disable-tests --disable-bench
          make $MAKEFLAGS

  # ============================================
  # macOS ARM64 (native Apple Silicon)
  # ============================================
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install automake libtool boost miniupnpc openssl@3 pkg-config libevent zeromq

      - name: Build
        env:
          BOOST_ROOT: /opt/homebrew
        run: |
          ./autogen.sh
          ./configure --without-gui --disable-tests --disable-bench --disable-wallet \
            --with-boost=/opt/homebrew \
            LDFLAGS="-L/opt/homebrew/lib -L/opt/homebrew/opt/openssl@3/lib -L/opt/homebrew/opt/libevent/lib" \
            CPPFLAGS="-I/opt/homebrew/include -I/opt/homebrew/opt/openssl@3/include -I/opt/homebrew/opt/libevent/include"
          make $MAKEFLAGS
