name: Windows Native Build

on:
  push:
    branches: [soqucoin-genesis, master]
  pull_request:
    branches: [soqucoin-genesis, master]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-miniupnpc
            autoconf
            automake
            libtool
            make
            pkg-config
            git
      
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: windows-native-ccache-${{ github.sha }}
          restore-keys: |
            windows-native-ccache-
      
      - name: Build Soqucoin
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure \
            --disable-gui \
            --disable-tests \
            --disable-bench \
            --disable-wallet \
            --without-miniupnpc \
            --enable-reduce-exports \
            --with-boost=/mingw64 \
            --with-boost-libdir=/mingw64/lib \
            CPPFLAGS="-I/mingw64/include" \
            LDFLAGS="-L/mingw64/lib -static" \
            CXXFLAGS="-O2"
          make -j$(nproc) V=1
      
      - name: Smoke Test - Version
        shell: msys2 {0}
        run: |
          echo "Testing soqucoind..."
          ./src/soqucoind.exe --version && echo "soqucoind OK" || echo "soqucoind version check failed"
          echo "Testing soqucoin-tx..."
          ./src/soqucoin-tx.exe --version && echo "soqucoin-tx OK" || echo "soqucoin-tx version check failed"
          echo "Testing soqucoin-cli exists..."
          test -f ./src/soqucoin-cli.exe && echo "soqucoin-cli OK" || exit 1
          echo "SUCCESS: All binaries exist and core binaries report version"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soqucoin-windows-x64
          path: |
            src/soqucoind.exe
            src/soqucoin-cli.exe
            src/soqucoin-tx.exe
