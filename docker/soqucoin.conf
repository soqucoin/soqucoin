# Soqucoin Docker Configuration
server=1
listen=1
daemon=0
# Allow RPC from any IP (Docker controls access via port mapping)
rpcallowip=0.0.0.0/0
rpcuser=soqu
rpcpassword=change_this_password_in_production

# Network Configuration (Testnet)
testnet=1
[test]
rpcport=18332
port=18333

# Optimization
maxconnections=125
logtimestamps=1
printtoconsole=1
