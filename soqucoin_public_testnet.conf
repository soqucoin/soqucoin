# Soqucoin Public Testnet Configuration
# Node: Mac M4 (Primary Seed Node)
# DNS: testnet.soqu.org -> 217.177.223.180
# Created: 2025-12-05

# === NETWORK ===
testnet=1
server=1
daemon=1
listen=1

# Public mode - allow peer discovery
# (Remove 'connect=0' to enable peer connections)
dnsseed=0  # No DNS seeds for fresh testnet

# === RPC (For Stratum Bridge & CLI) ===
rpcuser=soqupublic
rpcpassword=TestnetSecure2025!
rpcbind=0.0.0.0
rpcport=44556
rpcallowip=127.0.0.1
rpcallowip=192.168.0.0/16

# === PORTS ===
# P2P: 44555 (Testnet Default) - Forwarded in router
# RPC: 44556 (Testnet Default)
# Stratum: 3333 (Bridge) - Forwarded in router
port=44555

# === LOGGING ===
debug=net
debug=rpc
printtoconsole=0

# === PERFORMANCE ===
maxconnections=125
