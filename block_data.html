<!DOCTYPE html>

        // Add 146 more placeholder txs to simulate the full block
        for (let i = 0; i < 146; i++) {
            blockData.tx.push({
                "txid": "confidential_tx_" + (i + 2),
                "size": 5085,
                "vsize": 2278,
                "witness": "Dilithium ML-DSA-44"
            });
        }

        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        document.getElementById('json-display').innerHTML = syntaxHighlight(blockData);
    </script>
