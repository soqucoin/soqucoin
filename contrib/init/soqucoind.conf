description "Soqucoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env SOQUCOIND_BIN="/usr/bin/soqucoind"
env SOQUCOIND_USER="soqucoin"
env SOQUCOIND_GROUP="soqucoin"
env SOQUCOIND_PIDDIR="/var/run/soqucoind"
# upstart can't handle variables constructed with other variables
env SOQUCOIND_PIDFILE="/var/run/soqucoind/soqucoind.pid"
env SOQUCOIND_CONFIGFILE="/etc/soqucoin/soqucoin.conf"
env SOQUCOIND_DATADIR="/var/lib/soqucoind"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # soqucoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$SOQUCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run soqucoind."
        echo "The setting must appear in $SOQUCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following"
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is also recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Soqucoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$SOQUCOIND_PIDDIR"
    chmod 0755 "$SOQUCOIND_PIDDIR"
    chown $SOQUCOIND_USER:$SOQUCOIND_GROUP "$SOQUCOIND_PIDDIR"
    chown $SOQUCOIND_USER:$SOQUCOIND_GROUP "$SOQUCOIND_CONFIGFILE"
    chmod 0660 "$SOQUCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$SOQUCOIND_PIDFILE" \
    --chuid $SOQUCOIND_USER:$SOQUCOIND_GROUP \
    --exec "$SOQUCOIND_BIN" \
    -- \
    -pid="$SOQUCOIND_PIDFILE" \
    -conf="$SOQUCOIND_CONFIGFILE" \
    -datadir="$SOQUCOIND_DATADIR" \
    -disablewallet \
    -daemon

